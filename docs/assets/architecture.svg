<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1400" viewBox="0 0 2000 1400" role="img" aria-labelledby="title desc">
  <title id="title">Cadra architecture diagram</title>
  <desc id="desc">A top-to-bottom software architecture flow for Cadra.</desc>
  <defs>
    <marker id="arrow-gold" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#C5A55A"/>
    </marker>
    <style>
      .canvas { fill: #FFFFFF; }
      .node { fill: #FFFFFF; stroke: #1B2A4A; stroke-width: 2; }
      .soft-node { fill: #F2F2F2; stroke: #1B2A4A; stroke-width: 2; }
      .emphasis { fill: #1B2A4A; stroke: #1B2A4A; stroke-width: 2; }
      .container { fill: #F2F2F2; stroke: #1B2A4A; stroke-width: 2; }
      .flow { fill: none; stroke: #C5A55A; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-gold); }
      .flow-plain { fill: none; stroke: #C5A55A; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .flow-dashed { fill: none; stroke: #C5A55A; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 12 12; marker-end: url(#arrow-gold); }
      .heading { font-family: Georgia, "Times New Roman", serif; font-weight: 700; fill: #1B2A4A; }
      .body { font-family: Arial, Helvetica, sans-serif; fill: #2C2C2C; }
      .body-navy { font-family: Arial, Helvetica, sans-serif; fill: #1B2A4A; }
      .white-heading { font-family: Georgia, "Times New Roman", serif; font-weight: 700; fill: #FFFFFF; }
      .white-body { font-family: Arial, Helvetica, sans-serif; fill: #FFFFFF; }
      .container-label { font-family: Arial, Helvetica, sans-serif; font-weight: 700; letter-spacing: 1.5px; fill: #1B2A4A; }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="2000" height="1400"/>

  <!-- Entry points -->
  <rect class="node" x="160" y="95" width="500" height="88" rx="8"/>
  <text class="heading" x="410" y="149" font-size="25" text-anchor="middle">Code (Agent SDK builder)</text>

  <rect class="node" x="750" y="95" width="500" height="88" rx="8"/>
  <text class="heading" x="1000" y="149" font-size="25" text-anchor="middle">Agent via MCP Server</text>

  <rect class="node" x="1340" y="95" width="500" height="88" rx="8"/>
  <text class="heading" x="1590" y="149" font-size="25" text-anchor="middle">Visual Studio Editor</text>

  <!-- Unified DSL -->
  <rect class="emphasis" x="500" y="250" width="1000" height="108" rx="8"/>
  <text class="white-heading" x="1000" y="313" font-size="34" text-anchor="middle" xml:space="preserve">Unified Scene DSL  (schema-validated, versioned)</text>

  <!-- Side providers -->
  <rect class="container" x="90" y="382" width="380" height="158" rx="8"/>
  <text class="container-label" x="280" y="424" font-size="16" text-anchor="middle">GENERATIVE VIDEO PROVIDERS</text>
  <rect class="node" x="116" y="458" width="55" height="48" rx="8"/>
  <text class="body-navy" x="143.5" y="489" font-size="18" text-anchor="middle">Veo</text>
  <rect class="node" x="183" y="458" width="75" height="48" rx="8"/>
  <text class="body-navy" x="220.5" y="489" font-size="18" text-anchor="middle">Runway</text>
  <rect class="node" x="270" y="458" width="58" height="48" rx="8"/>
  <text class="body-navy" x="299" y="489" font-size="18" text-anchor="middle">Kling</text>
  <rect class="node" x="340" y="458" width="58" height="48" rx="8"/>
  <text class="body-navy" x="369" y="489" font-size="18" text-anchor="middle">Luma</text>
  <rect class="node" x="410" y="458" width="44" height="48" rx="8"/>
  <text class="body-navy" x="432" y="489" font-size="18" text-anchor="middle">Pika</text>

  <!-- Core flow -->
  <rect class="node" x="500" y="452" width="1000" height="96" rx="8"/>
  <text class="heading" x="1000" y="509" font-size="23" text-anchor="middle" xml:space="preserve">Deterministic Timeline Engine  (resolves scene state per integer frame)</text>

  <rect class="node" x="560" y="625" width="880" height="96" rx="8"/>
  <text class="heading" x="1000" y="682" font-size="27" text-anchor="middle" xml:space="preserve">Three.js Renderer  (WebGPU, falls back to WebGL2)</text>

  <!-- Output paths -->
  <rect class="container" x="260" y="800" width="600" height="300" rx="8"/>
  <text class="container-label" x="294" y="846" font-size="18">LIVE PREVIEW</text>
  <rect class="node" x="370" y="918" width="380" height="92" rx="8"/>
  <text class="heading" x="560" y="974" font-size="27" text-anchor="middle">Browser Playback</text>

  <rect class="container" x="1140" y="800" width="600" height="370" rx="8"/>
  <text class="container-label" x="1174" y="846" font-size="18">HEADLESS RENDER</text>
  <rect class="node" x="1230" y="875" width="420" height="74" rx="8"/>
  <text class="heading" x="1440" y="921" font-size="23" text-anchor="middle">WebCodecs Capture and Encode</text>
  <rect class="node" x="1230" y="982" width="420" height="74" rx="8"/>
  <text class="heading" x="1440" y="1028" font-size="25" text-anchor="middle">MP4 / WebM Mux</text>
  <rect class="node" x="1230" y="1089" width="420" height="74" rx="8"/>
  <text class="heading" x="1440" y="1135" font-size="25" text-anchor="middle">Deterministic Output File</text>

  <!-- Connectors: entries to DSL -->
  <path class="flow" d="M 410 183 L 760 250"/>
  <path class="flow" d="M 1000 183 L 1000 250"/>
  <path class="flow" d="M 1590 183 L 1240 250"/>

  <!-- Providers to DSL -->
  <path class="flow-dashed" d="M 470 461 C 535 425, 455 310, 500 304"/>

  <!-- Main vertical flow -->
  <path class="flow" d="M 1000 358 L 1000 452"/>
  <path class="flow" d="M 1000 548 L 1000 625"/>

  <!-- Split to output paths -->
  <path class="flow-plain" d="M 1000 721 L 1000 765"/>
  <path class="flow-plain" d="M 560 765 L 1440 765"/>
  <path class="flow" d="M 560 765 L 560 918"/>
  <path class="flow" d="M 1440 765 L 1440 875"/>

  <!-- Headless internal flow -->
  <path class="flow" d="M 1440 949 L 1440 982"/>
  <path class="flow" d="M 1440 1056 L 1440 1089"/>

  <!-- Caption -->
  <text class="body" x="1000" y="1305" font-size="24" text-anchor="middle">One scene description. Authored anywhere. Rendered identically everywhere.</text>
</svg>
